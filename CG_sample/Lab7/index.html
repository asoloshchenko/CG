<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at 20% 20%, #eaf6ff 0%, #cfeaff 45%, #b8dcff 100%);
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  #controls {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 2;
    display: grid;
    gap: 8px;
    padding: 12px 14px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 14px;
    background: rgba(10, 12, 18, 0.72);
    color: #f3f5ff;
    font-family: system-ui, sans-serif;
    font-size: 14px;
    backdrop-filter: blur(10px);
    min-width: 190px;
  }

  #controls label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }

</style>
<body>
  <div id="controls">
    <label><input type="checkbox" id="toggleBloom"> Bloom</label>
    <label><input type="checkbox" id="toggleVignette"> Vignette</label>
    <label><input type="checkbox" id="toggleGrain"> Grain</label>
    <label><input type="checkbox" id="toggleGrading"> Color Grading</label>
  </div>
  <canvas id="glcanvas" width="600" height="600"></canvas>
  <script type="module" src="./main.js"></script>
</body>
</html>
